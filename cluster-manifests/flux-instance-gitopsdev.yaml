# This resource depends on a secret in the target cluster, created for example as follows:
# flux create secret git flux-system --url=https://github.com/MoTTTT/gitopsdev-infra.git --username=martinjcolley@gmail.com --password=$GITLAB_TOKEN

apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.7.x"
    registry: "ghcr.io/fluxcd"
  sync:
    kind: GitRepository
    url: "https://github.com/MoTTTT/gitopsdev-infra.git"
    ref: "refs/heads/main"
    path: "clusters/gitopsdev"
    pullSecret: "flux-system"
