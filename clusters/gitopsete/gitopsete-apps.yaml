---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gitopsapi
  namespace: flux-system
spec:
  dependsOn:
    - name: 02-storage
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/gitops-apps/gitopsapi-ete
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age

