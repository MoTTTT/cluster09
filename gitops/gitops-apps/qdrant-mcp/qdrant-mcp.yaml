---
apiVersion: v1
kind: Namespace
metadata:
  name: qdrant-mcp

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-mcp
  namespace: qdrant-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant-mcp
  template:
    metadata:
      labels:
        app: qdrant-mcp
    spec:
      containers:
        - name: qdrant-mcp
          image: ghcr.io/qdrant/mcp-server-qdrant:latest
          args:
            - --transport
            - sse
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
          env:
            - name: QDRANT_URL
              value: "http://qdrant.qdrant.svc.cluster.local:6333"
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-mcp
  namespace: qdrant-mcp
spec:
  selector:
    app: qdrant-mcp
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
