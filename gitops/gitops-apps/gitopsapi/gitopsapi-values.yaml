image:
  repository: ghcr.io/motttt/gitopsapi
  tag: "v0.1.6"
  pullPolicy: IfNotPresent
  pullSecretName: ghcr-pull-secret

gitops:
  repoUrl: "https://github.com/MoTTTT/management-infra.git"
  branch: main
  githubRepo: "MoTTTT/management-infra"
  githubOrg: "MoTTTT"
  localPath: /tmp/gitops-repo

secrets:
  githubTokenSecret: gitopsapi-github-token
  mgmtKubeconfigSecret: gitopsapi-mgmt-kubeconfig
  ageKeySecret: gitopsapi-age-key

expose:
  hostname: gitopsgui.podzone.cloud
  gatewayName: gateway
  gatewayNamespace: kube-system
  tlsSecretName: gitopsgui-tls

externalURL: https://gitopsgui.podzone.cloud

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
