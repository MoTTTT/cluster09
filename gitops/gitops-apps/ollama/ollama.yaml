---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ollama
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.otwld.com/

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: flux-system
spec:
  targetNamespace: ollama
  interval: 30m
  chart:
    spec:
      chart: ollama
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: ollama-values
