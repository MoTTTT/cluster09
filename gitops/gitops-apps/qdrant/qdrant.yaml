---
apiVersion: v1
kind: Namespace
metadata:
  name: qdrant

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: qdrant
  namespace: flux-system
spec:
  interval: 24h
  url: https://qdrant.github.io/qdrant-helm

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: flux-system
spec:
  targetNamespace: qdrant
  interval: 30m
  chart:
    spec:
      chart: qdrant
      version: "1.17.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: qdrant-values
