app-template:
  openclawVersion: "2026.3.1"
  configMode: merge

expose:
  type: route
  tls:
    certSource: secret
    secret:
      secretName: openclaw-secret
  route:
    parentRefs:
      - name: gateway
        namespace: kube-system
        kind: Gateway
    hosts: 
      - thoth.podzone.cloud

externalURL: https://thoth.podzone.cloud
