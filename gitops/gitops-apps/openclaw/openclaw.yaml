---
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openclaw
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.openclaw.ai/

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
  namespace: flux-system
spec:
  targetNamespace: openclaw
  interval: 30m
  chart:
    spec:
      chart: openclaw
      version: "2026.3.1"
      sourceRef:
        kind: HelmRepository
        name: openclaw
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: openclaw-values
