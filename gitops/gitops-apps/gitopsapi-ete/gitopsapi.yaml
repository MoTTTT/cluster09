---
apiVersion: v1
kind: Namespace
metadata:
  name: gitopsapi

---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: gitopsapi-oci
  namespace: flux-system
spec:
  type: oci
  interval: 5m
  url: oci://ghcr.io/podzoneplatformengineering

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitopsapi
  namespace: flux-system
spec:
  targetNamespace: gitopsapi
  interval: 30m
  chart:
    spec:
      chart: gitopsapi
      version: "0.1.5"
      sourceRef:
        kind: HelmRepository
        name: gitopsapi-oci
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: gitopsapi-ete-values
