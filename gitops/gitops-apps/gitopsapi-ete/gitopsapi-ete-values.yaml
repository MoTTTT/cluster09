image:
  repository: ghcr.io/motttt/gitopsapi
  # TODO: update to ghcr.io/podzoneplatformengineering/gitopsapi after org-move image publish
  tag: "v0.1.6"
  pullPolicy: IfNotPresent

gitops:
  repoUrl: "https://github.com/PodZonePlatformEngineering/gitopsapi-instance-ete001.git"
  branch: main
  githubRepo: "PodZonePlatformEngineering/gitopsapi-instance-ete001"
  githubOrg: "PodZonePlatformEngineering"
  localPath: /tmp/gitops-repo

clusterChart:
  repoUrl: "oci://ghcr.io/podzoneplatformengineering/cluster-chart"
  version: "0.1.40"

instance:
  namespace: "gitopsapi"

secrets:
  githubTokenSecret: gitopsapi-github-token
  mgmtKubeconfigSecret: gitopsapi-mgmt-kubeconfig
  ageKeySecret: gitopsapi-sops-age

expose:
  hostname: gitopsapi.gitopsete.podzone.cloud
  gatewayName: gateway
  gatewayNamespace: kube-system
  tlsSecretName: gitopsapi-tls

externalURL: https://gitopsapi.gitopsete.podzone.cloud

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"
